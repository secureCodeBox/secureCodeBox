version: "3.48.0"

env:
  IMG_NS: securecodebox
  IMG_TAG:
    sh: 'echo "sha-$(git rev-parse --short HEAD)"'

vars:
  # COMPONENT_DIR must be set by the including Taskfile
  COMPONENT_DIR: '{{ .COMPONENT_DIR }}'
  COMPONENT_NAME: '{{ .COMPONENT_NAME | default "auto-discovery" }}'
  # ENVTEST_K8S_VERSION derived from go.mod
  ENVTEST_K8S_VERSION:
    sh: cd {{ .COMPONENT_DIR }} && go list -m -f '{{"{{"}}.Version{{"}}"}}' k8s.io/api 2>/dev/null | sed -E 's/^v?[0-9]+\.([0-9]+).*/1.\1/'
  ENVTEST_VERSION:
    sh: cd {{ .COMPONENT_DIR }} && go list -m -f '{{"{{"}}.Version{{"}}"}}' sigs.k8s.io/controller-runtime 2>/dev/null | sed -E 's/^v?([0-9]+)\.([0-9]+).*/release-\1.\2/'
  LOCALBIN: '{{ .COMPONENT_DIR }}/bin'

tasks:
  fmt:
    desc: "Run go fmt against code"
    dir: '{{ .COMPONENT_DIR }}'
    cmds:
      - go fmt ./...

  vet:
    desc: "Run go vet against code"
    dir: '{{ .COMPONENT_DIR }}'
    cmds:
      - go vet ./...

  envtest:
    desc: "Download setup-envtest locally if necessary"
    run: once
    dir: '{{ .COMPONENT_DIR }}'
    generates:
      - '{{ .LOCALBIN }}/setup-envtest'
      - '{{ .LOCALBIN }}/.setup-envtest.version'
    cmds:
      - mkdir -p {{ .LOCALBIN }}
      - rm -f {{ .LOCALBIN }}/setup-envtest
      - GOBIN={{ .LOCALBIN }} go install sigs.k8s.io/controller-runtime/tools/setup-envtest@{{ .ENVTEST_VERSION }}
      - echo "{{ .ENVTEST_VERSION }}" > {{ .LOCALBIN }}/.setup-envtest.version
    status:
      - test -f {{ .LOCALBIN }}/setup-envtest
      - grep -qxF "{{ .ENVTEST_VERSION }}" {{ .LOCALBIN }}/.setup-envtest.version 2>/dev/null

  test:
    desc: "Run Go tests"
    deps: [fmt, vet, envtest]
    dir: '{{ .COMPONENT_DIR }}'
    cmds:
      - |
        KUBEBUILDER_ASSETS="$({{ .LOCALBIN }}/setup-envtest use {{ .ENVTEST_K8S_VERSION }} --bin-dir {{ .LOCALBIN }} -p path)" \
        go test ./... -coverprofile cover.out

  ginkgo:
    desc: "Run Ginkgo tests with verbose output"
    deps: [fmt, vet, envtest]
    dir: '{{ .COMPONENT_DIR }}'
    cmds:
      - |
        KUBEBUILDER_ASSETS="$({{ .LOCALBIN }}/setup-envtest use {{ .ENVTEST_K8S_VERSION }} --bin-dir {{ .LOCALBIN }} -p path)" \
        ginkgo test ./... -coverprofile cover.out -v --progress

  helm-unit-tests:
    desc: "Run helm unit tests"
    dir: '{{ .COMPONENT_DIR }}'
    preconditions:
      - msg: "Helm unittest plugin is not installed. Install it from https://github.com/helm-unittest/helm-unittest/"
        sh: "helm plugin list | grep -q 'unittest' || false"
    cmds:
      - 'echo "Running helm unit tests for {{ .COMPONENT_NAME }}"'
      - helm unittest .

  build:
    desc: "Build the binary"
    deps: [fmt, vet]
    dir: '{{ .COMPONENT_DIR }}'
    cmds:
      - go build -o bin/{{ .BINARY_NAME }} {{ .BUILD_CMD }}

  docker-build:
    desc: "Build Docker image"
    dir: '{{ .COMPONENT_DIR }}'
    preconditions:
      - msg: "Docker is not running, please start Docker first"
        sh: "docker info >/dev/null 2>&1 || false"
    cmds:
      - 'echo "Building Container Image for {{ .COMPONENT_NAME }}"'
      - docker build -t ${IMG_NS}/{{ .COMPONENT_NAME }}:${IMG_TAG} .
    status:
      - docker images | grep -q "${IMG_NS}/{{ .COMPONENT_NAME }}:${IMG_TAG}" || false

  docker-push:
    desc: "Push Docker image"
    dir: '{{ .COMPONENT_DIR }}'
    cmds:
      - docker push ${IMG_NS}/{{ .COMPONENT_NAME }}:${IMG_TAG}

  docker-export:
    desc: "Export Docker image to tar file"
    deps: [docker-build]
    dir: '{{ .COMPONENT_DIR }}'
    cmds:
      - 'echo "Exporting Container Image"'
      - docker save ${IMG_NS}/{{ .COMPONENT_NAME }}:${IMG_TAG} > {{ .COMPONENT_NAME }}.tar

  kind-import:
    desc: "Import Docker image into kind cluster"
    deps: [docker-export]
    dir: '{{ .COMPONENT_DIR }}'
    cmds:
      - 'echo "Importing image archive to local kind cluster"'
      - kind load image-archive ./{{ .COMPONENT_NAME }}.tar

  helm-deploy:
    desc: "Deploy to kind cluster using Helm"
    dir: '{{ .COMPONENT_DIR }}'
    cmds:
      - 'echo "Deploying {{ .COMPONENT_NAME }} with image tag ${IMG_TAG} into kind"'
      - |
        helm -n integration-tests upgrade --install {{ .COMPONENT_NAME }} ./ --wait \
          --set="image.repository=docker.io/${IMG_NS}/{{ .COMPONENT_NAME }}" \
          --set="image.tag=${IMG_TAG}" \
          --set="image.pullPolicy=IfNotPresent" \
          {{ .HELM_EXTRA_ARGS }}
