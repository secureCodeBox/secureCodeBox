version: "3.48.0"

env:
  IMG_NS: securecodebox
  IMG_TAG:
    sh: 'echo "sha-$(git rev-parse --short HEAD)"'

vars:
  COMPONENT_NAME: kubernetes
  BINARY_NAME: manager
  BUILD_CMD: main.go
  CONTROLLER_TOOLS_VERSION: v0.18.0
  LOCALBIN: '{{ .TASKFILE_DIR }}/bin'
  ENVTEST_K8S_VERSION:
    sh: cd {{ .TASKFILE_DIR }} && go list -m -f '{{"{{"}}.Version{{"}}"}}' k8s.io/api 2>/dev/null | sed -E 's/^v?[0-9]+\.([0-9]+).*/1.\1/'
  ENVTEST_VERSION:
    sh: cd {{ .TASKFILE_DIR }} && go list -m -f '{{"{{"}}.Version{{"}}"}}' sigs.k8s.io/controller-runtime 2>/dev/null | sed -E 's/^v?([0-9]+)\.([0-9]+).*/release-\1.\2/'

tasks:
  fmt:
    desc: "Run go fmt against code"
    dir: '{{ .TASKFILE_DIR }}'
    cmds:
      - go fmt ./...

  vet:
    desc: "Run go vet against code"
    dir: '{{ .TASKFILE_DIR }}'
    cmds:
      - go vet ./...

  envtest:
    desc: "Download setup-envtest locally if necessary"
    run: once
    dir: '{{ .TASKFILE_DIR }}'
    generates:
      - '{{ .LOCALBIN }}/setup-envtest'
      - '{{ .LOCALBIN }}/.setup-envtest.version'
    cmds:
      - mkdir -p {{ .LOCALBIN }}
      - rm -f {{ .LOCALBIN }}/setup-envtest
      - GOBIN={{ .LOCALBIN }} go install sigs.k8s.io/controller-runtime/tools/setup-envtest@{{ .ENVTEST_VERSION }}
      - echo "{{ .ENVTEST_VERSION }}" > {{ .LOCALBIN }}/.setup-envtest.version
    status:
      - test -f {{ .LOCALBIN }}/setup-envtest
      - grep -qxF "{{ .ENVTEST_VERSION }}" {{ .LOCALBIN }}/.setup-envtest.version 2>/dev/null

  controller-gen:
    desc: "Download controller-gen locally if necessary"
    run: once
    dir: '{{ .TASKFILE_DIR }}'
    generates:
      - '{{ .LOCALBIN }}/controller-gen'
      - '{{ .LOCALBIN }}/.controller-gen.version'
    cmds:
      - mkdir -p {{ .LOCALBIN }}
      - rm -f {{ .LOCALBIN }}/controller-gen
      - GOBIN={{ .LOCALBIN }} go install sigs.k8s.io/controller-tools/cmd/controller-gen@{{ .CONTROLLER_TOOLS_VERSION }}
      - echo "{{ .CONTROLLER_TOOLS_VERSION }}" > {{ .LOCALBIN }}/.controller-gen.version
    status:
      - test -f {{ .LOCALBIN }}/controller-gen
      - grep -qxF "{{ .CONTROLLER_TOOLS_VERSION }}" {{ .LOCALBIN }}/.controller-gen.version 2>/dev/null

  manifests:
    desc: "Generate WebhookConfiguration, ClusterRole and CustomResourceDefinition objects"
    deps: [controller-gen]
    dir: '{{ .TASKFILE_DIR }}'
    cmds:
      - |
        {{ .LOCALBIN }}/controller-gen rbac:roleName=auto-discovery,headerFile="hack/boilerplate.yaml.txt" \
          crd paths="./..." \
          output:crd:artifacts:config=crds \
          output:rbac:artifacts:config=templates/rbac

  test:
    desc: "Run Go tests with manifests generation"
    deps: [manifests, fmt, vet, envtest]
    dir: '{{ .TASKFILE_DIR }}'
    cmds:
      - |
        KUBEBUILDER_ASSETS="$({{ .LOCALBIN }}/setup-envtest use {{ .ENVTEST_K8S_VERSION }} --bin-dir {{ .LOCALBIN }} -p path)" \
        go test ./... -coverprofile cover.out

  ginkgo:
    desc: "Run Ginkgo tests with verbose output and manifests generation"
    deps: [manifests, fmt, vet, envtest]
    dir: '{{ .TASKFILE_DIR }}'
    cmds:
      - |
        KUBEBUILDER_ASSETS="$({{ .LOCALBIN }}/setup-envtest use {{ .ENVTEST_K8S_VERSION }} --bin-dir {{ .LOCALBIN }} -p path)" \
        ginkgo test ./... -coverprofile cover.out -v --progress

  run:
    desc: "Run the kubernetes auto-discovery controller from your host"
    deps: [manifests, fmt, vet]
    dir: '{{ .TASKFILE_DIR }}'
    cmds:
      - go run ./main.go --config ./auto-discovery-config.yaml

  build:
    desc: "Build the binary"
    deps: [fmt, vet]
    dir: '{{ .TASKFILE_DIR }}'
    cmds:
      - go build -o bin/{{ .BINARY_NAME }} {{ .BUILD_CMD }}

  helm-unit-tests:
    desc: "Run helm unit tests"
    dir: '{{ .TASKFILE_DIR }}'
    preconditions:
      - msg: "Helm unittest plugin is not installed. Install it from https://github.com/helm-unittest/helm-unittest/"
        sh: "helm plugin list | grep -q 'unittest' || false"
    cmds:
      - helm unittest .

  docker-build:
    desc: "Build Docker image"
    dir: '{{ .TASKFILE_DIR }}'
    preconditions:
      - msg: "Docker is not running, please start Docker first"
        sh: "docker info >/dev/null 2>&1 || false"
    cmds:
      - docker build -t ${IMG_NS}/auto-discovery-{{ .COMPONENT_NAME }}:${IMG_TAG} .
    status:
      - docker images | grep -q "${IMG_NS}/auto-discovery-{{ .COMPONENT_NAME }}:${IMG_TAG}"

  docker-push:
    desc: "Push Docker image"
    dir: '{{ .TASKFILE_DIR }}'
    cmds:
      - docker push ${IMG_NS}/auto-discovery-{{ .COMPONENT_NAME }}:${IMG_TAG}

  docker-export:
    desc: "Export Docker image to tar file"
    deps: [docker-build]
    dir: '{{ .TASKFILE_DIR }}'
    cmds:
      - docker save ${IMG_NS}/auto-discovery-{{ .COMPONENT_NAME }}:${IMG_TAG} > auto-discovery-{{ .COMPONENT_NAME }}.tar

  kind-import:
    desc: "Import Docker image into kind cluster"
    deps: [docker-export]
    dir: '{{ .TASKFILE_DIR }}'
    cmds:
      - kind load image-archive ./auto-discovery-{{ .COMPONENT_NAME }}.tar

  install:
    desc: "Install CRDs into the K8s cluster specified in ~/.kube/config"
    deps: [manifests]
    dir: '{{ .TASKFILE_DIR }}'
    cmds:
      - kubectl apply -f ./crds/

  uninstall:
    desc: "Uninstall CRDs from the K8s cluster specified in ~/.kube/config"
    deps: [manifests]
    dir: '{{ .TASKFILE_DIR }}'
    cmds:
      - kubectl delete -f ./crds/
